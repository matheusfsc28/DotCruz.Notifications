name: Continuous Deployment

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry (GHCR)
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Downcase Repo Name for Docker
        run: |
          echo "REPO_NAME=${GITHUB_REPOSITORY,,}" >> ${GITHUB_ENV}

      # Compila e envia a imagem para o GHCR
      - name: Build and Push API Image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: src/DotCruz.Notifications.Api/Dockerfile
          push: true
          tags: ghcr.io/${{ env.REPO_NAME }}/dotcruz-notifications-api:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Cria a pasta de destino na VPS remota se não existir
      - name: Create Remote Directory
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            mkdir -p ${{ secrets.VPS_DEPLOY_PATH }}

      # Copia o docker-compose.prod.yml para a VPS
      - name: Copy docker-compose.prod.yml to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          source: "docker-compose.prod.yml"
          target: "${{ secrets.VPS_DEPLOY_PATH }}"

      # Executa o deploy remoto injetando os Secrets no .env e subindo o serviço
      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT }}
          script: |
            cd ${{ secrets.VPS_DEPLOY_PATH }}
            
            # Renomeia o compose de prod para o padrão do compose
            mv -f docker-compose.prod.yml docker-compose.yml 2>/dev/null || true
            
            # Injeta variáveis de ambiente de produção a partir do GitHub Secrets no arquivo .env local
            cat <<EOF > .env
            DOCKER_IMAGE_TAG=ghcr.io/${{ env.REPO_NAME }}/dotcruz-notifications-api:latest
            API_KEY=${{ secrets.API_KEY }}
            MONGO_CONNECTION_STRING=${{ secrets.MONGO_CONNECTION_STRING }}
            MONGO_DATABASE_NAME=${{ secrets.MONGO_DATABASE_NAME }}
            AWS_REGION=${{ secrets.AWS_REGION }}
            AWS_ACCESS_KEY_ID_VPS=${{ secrets.AWS_ACCESS_KEY_ID_VPS }}
            AWS_SECRET_ACCESS_KEY_VPS=${{ secrets.AWS_SECRET_ACCESS_KEY_VPS }}
            AWS_SQS_QUEUE_ARN=${{ secrets.AWS_SQS_QUEUE_ARN }}
            AWS_SCHEDULER_ROLE_ARN=${{ secrets.AWS_SCHEDULER_ROLE_ARN }}
            AWS_SMTP_PARAMETER_PATH=${{ secrets.AWS_SMTP_PARAMETER_PATH }}
            EOF
            
            # Restringe as permissões do arquivo .env para apenas o dono ler/escrever
            chmod 600 .env
            
            # Login no Registry do GitHub
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            # Atualiza o contêiner na VPS
            docker compose pull
            docker compose up -d
            
            # Remove imagens órfãs para limpar espaço em disco
            docker image prune -f
